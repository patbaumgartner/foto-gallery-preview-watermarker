# -------------------------------------------------------------------------
# Foto-Gallery Preview Watermarker – default configuration
# -------------------------------------------------------------------------

# Directory containing the source image gallery (relative or absolute path)
gallery.input-dir=input

# Directory where processed images are written (created if it does not exist)
gallery.output-dir=output

# Scale factor applied to both width and height of each image.
# 0.5 = half size, 1.0 = original size, 2.0 = double size
gallery.resize-factor=0.5

# Path to the white-transparent PNG watermark.
# Supports Spring resource prefixes: classpath:, file:, http:
gallery.watermark-path=classpath:watermark.png

# Reduce startup noise for a console application
spring.main.banner-mode=off
logging.level.root=WARN
logging.level.com.fortytwotalents=INFO
