# -----------------------------------------------------------------------
# foto-gallery-preview-watermarker configuration
# -----------------------------------------------------------------------

# Path to the folder containing the original images (and sub-folders).
watermarker.input-folder=.

# Path to the folder where processed preview images will be written.
# The sub-folder structure of the input folder is mirrored here.
watermarker.output-folder=./output

# Resize factor: each image dimension is divided by this value.
# A factor of 10 reduces a 4000x3000 image to 400x300.
watermarker.resize-factor=10

# Watermark logo.
# Supports:
#   classpath:logo.png        (bundled inside the JAR)
#   file:/absolute/path.png   (absolute file path)
#   /absolute/path/logo.png   (absolute file path without scheme)
watermarker.watermark-logo=classpath:logo.png

# Font size (in points) used to render the original filename on the preview.
watermarker.filename-font-size=12
